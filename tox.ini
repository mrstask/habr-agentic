[tox]
envlist = py311, lint
skipsdist = true

[testenv]
basepython = python3.11
changedir = backend
deps =
    -r{toxinidir}/backend/requirements.txt
    -r{toxinidir}/backend/requirements-test.txt
commands =
    pytest tests/ -v {posargs}

[testenv:lint]
basepython = python3.11
changedir = {toxinidir}
deps = ruff
commands =
    ruff check backend/ {posargs}

[pytest]
asyncio_mode = auto
testpaths = backend/tests
