[tox]
envlist = py314, lint
skipsdist = true

[testenv]
basepython = python3.14
changedir = backend
deps =
    -r{toxinidir}/backend/requirements.txt
    -r{toxinidir}/backend/requirements-test.txt
commands =
    pytest tests/ -v {posargs}

[testenv:lint]
basepython = python3.14
deps = ruff
commands =
    ruff check backend/ dev_team/ {posargs}

[pytest]
asyncio_mode = auto
testpaths = backend/tests
